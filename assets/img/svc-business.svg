<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3a52"/>
      <stop offset="1" stop-color="#1a2332"/>
    </linearGradient>
    <radialGradient id="glowB" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#b8945a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#b8945a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridB" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="360" fill="url(#bgB)"/>
  <rect width="600" height="360" fill="url(#gridB)"/>
  <rect width="600" height="360" fill="url(#glowB)"/>

  <!-- Bar chart -->
  <g transform="translate(80,90)">
    <rect x="0"   y="120" width="40" height="80"  fill="#b8945a" opacity="0.55" rx="2"/>
    <rect x="60"  y="80"  width="40" height="120" fill="#b8945a" opacity="0.7" rx="2"/>
    <rect x="120" y="40"  width="40" height="160" fill="#b8945a" rx="2"/>
    <rect x="180" y="10"  width="40" height="190" fill="#c9a96e" rx="2"/>
    <!-- Trend line -->
    <polyline points="20,135 80,95 140,55 200,25 260,15"
              fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="20"  cy="135" r="5" fill="#fff"/>
    <circle cx="80"  cy="95"  r="5" fill="#fff"/>
    <circle cx="140" cy="55"  r="5" fill="#fff"/>
    <circle cx="200" cy="25"  r="5" fill="#fff"/>
    <circle cx="260" cy="15"  r="6" fill="#b8945a" stroke="#fff" stroke-width="2"/>
    <!-- Baseline -->
    <line x1="-10" y1="205" x2="290" y2="205" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>

  <!-- Floating arrows / motion -->
  <g transform="translate(420,80)" opacity="0.75">
    <path d="M0 0 L40 -20 L40 -10 L80 -10 L80 10 L40 10 L40 20 Z" fill="#b8945a"/>
  </g>
  <g transform="translate(440,200)" opacity="0.5">
    <path d="M0 0 L30 -15 L30 -7 L60 -7 L60 7 L30 7 L30 15 Z" fill="#c9a96e"/>
  </g>

  <!-- Label -->
  <text x="80" y="55" fill="#b8945a" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700" letter-spacing="3">— BUSINESS GROWTH</text>
</svg>
