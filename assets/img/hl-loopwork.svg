<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2332"/>
      <stop offset="1" stop-color="#0f1822"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#b8945a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#b8945a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bgL)"/>
  <rect width="600" height="360" fill="url(#glowL)"/>

  <!-- Circular workflow -->
  <g transform="translate(300,180)">
    <!-- Outer ring -->
    <circle r="110" fill="none" stroke="rgba(184,148,90,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Main loop arc with arrow -->
    <path d="M 0 -90 A 90 90 0 1 1 -64 64" fill="none" stroke="#b8945a" stroke-width="3" stroke-linecap="round"/>
    <path d="M -64 64 L -77 50 M -64 64 L -50 70" fill="none" stroke="#b8945a" stroke-width="3" stroke-linecap="round"/>

    <!-- Nodes at 4 cardinal points -->
    <g>
      <circle cx="0" cy="-90" r="14" fill="#1a2332" stroke="#b8945a" stroke-width="2.5"/>
      <text x="0" y="-85" text-anchor="middle" fill="#b8945a" font-family="'Noto Serif JP',serif" font-size="14" font-weight="700" font-style="italic">1</text>

      <circle cx="90" cy="0" r="14" fill="#1a2332" stroke="#c9a96e" stroke-width="2.5"/>
      <text x="90" y="5" text-anchor="middle" fill="#c9a96e" font-family="'Noto Serif JP',serif" font-size="14" font-weight="700" font-style="italic">2</text>

      <circle cx="0" cy="90" r="14" fill="#1a2332" stroke="#b8945a" stroke-width="2.5"/>
      <text x="0" y="95" text-anchor="middle" fill="#b8945a" font-family="'Noto Serif JP',serif" font-size="14" font-weight="700" font-style="italic">3</text>

      <circle cx="-90" cy="0" r="14" fill="#1a2332" stroke="#c9a96e" stroke-width="2.5"/>
      <text x="-90" y="5" text-anchor="middle" fill="#c9a96e" font-family="'Noto Serif JP',serif" font-size="14" font-weight="700" font-style="italic">4</text>
    </g>

    <!-- Center logo -->
    <circle r="36" fill="rgba(184,148,90,0.12)" stroke="#b8945a" stroke-width="1.5"/>
    <text y="-2" text-anchor="middle" fill="#b8945a" font-family="'Noto Serif JP',serif" font-size="22" font-weight="700" font-style="italic">L</text>
    <text y="14" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="'Noto Sans JP',sans-serif" font-size="6" letter-spacing="2">LOOPWORK</text>
  </g>

  <!-- Floating tags -->
  <g font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="600">
    <rect x="70" y="80" width="80" height="20" rx="3" fill="rgba(184,148,90,0.15)" stroke="rgba(184,148,90,0.5)"/>
    <text x="78" y="93" fill="#b8945a">CRM</text>
    <text x="120" y="93" fill="rgba(255,255,255,0.5)">→</text>

    <rect x="460" y="80" width="80" height="20" rx="3" fill="rgba(184,148,90,0.15)" stroke="rgba(184,148,90,0.5)"/>
    <text x="468" y="93" fill="#b8945a">REPORT</text>
    <text x="525" y="93" fill="rgba(255,255,255,0.5)">→</text>

    <rect x="70" y="260" width="80" height="20" rx="3" fill="rgba(184,148,90,0.15)" stroke="rgba(184,148,90,0.5)"/>
    <text x="78" y="273" fill="#b8945a">TASKS</text>
    <text x="120" y="273" fill="rgba(255,255,255,0.5)">→</text>

    <rect x="460" y="260" width="80" height="20" rx="3" fill="rgba(184,148,90,0.15)" stroke="rgba(184,148,90,0.5)"/>
    <text x="468" y="273" fill="#b8945a">FORMS</text>
    <text x="525" y="273" fill="rgba(255,255,255,0.5)">→</text>
  </g>
</svg>
