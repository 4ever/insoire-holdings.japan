<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2332"/>
      <stop offset="1" stop-color="#0f1822"/>
    </linearGradient>
    <radialGradient id="glowH" cx="0.7" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#b8945a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#b8945a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bgH)"/>
  <rect width="600" height="360" fill="url(#glowH)"/>

  <!-- Three person silhouettes -->
  <g>
    <!-- Person 1 -->
    <g transform="translate(180,160)">
      <circle cx="0" cy="-30" r="22" fill="rgba(184,148,90,0.85)"/>
      <path d="M -38 60 Q -38 0 0 0 Q 38 0 38 60 Z" fill="rgba(184,148,90,0.85)"/>
    </g>
    <!-- Person 2 (center, lead) -->
    <g transform="translate(300,140)">
      <circle cx="0" cy="-32" r="26" fill="#b8945a"/>
      <path d="M -44 70 Q -44 0 0 0 Q 44 0 44 70 Z" fill="#b8945a"/>
    </g>
    <!-- Person 3 -->
    <g transform="translate(420,160)">
      <circle cx="0" cy="-30" r="22" fill="rgba(184,148,90,0.85)"/>
      <path d="M -38 60 Q -38 0 0 0 Q 38 0 38 60 Z" fill="rgba(184,148,90,0.85)"/>
    </g>
  </g>

  <!-- Plus / add badge on center person -->
  <g transform="translate(330,90)">
    <circle r="18" fill="#1a2332" stroke="#b8945a" stroke-width="2.5"/>
    <path d="M -9 0 L 9 0 M 0 -9 L 0 9" stroke="#b8945a" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Job posting card -->
  <g transform="translate(60,80)">
    <rect width="100" height="56" rx="3" fill="rgba(184,148,90,0.18)" stroke="rgba(184,148,90,0.5)"/>
    <text x="10" y="22" fill="#b8945a" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="700" letter-spacing="2">WE'RE HIRING</text>
    <text x="10" y="42" fill="#fff" font-family="'Noto Serif JP',serif" font-size="13" font-weight="600">Tokyo</text>
  </g>

  <!-- Tag -->
  <g transform="translate(450,240)">
    <rect width="100" height="42" rx="3" fill="rgba(184,148,90,0.12)" stroke="rgba(184,148,90,0.4)"/>
    <text x="50" y="18" text-anchor="middle" fill="#b8945a" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="700" letter-spacing="2">SALES</text>
    <text x="50" y="34" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="'Noto Sans JP',sans-serif" font-size="9">Consultant</text>
  </g>
</svg>
