<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3a52"/>
      <stop offset="1" stop-color="#1a2332"/>
    </linearGradient>
    <radialGradient id="glowE" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#b8945a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#b8945a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridE" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="360" fill="url(#bgE)"/>
  <rect width="600" height="360" fill="url(#gridE)"/>
  <rect width="600" height="360" fill="url(#glowE)"/>

  <!-- Globe -->
  <g transform="translate(300,180)">
    <circle r="100" fill="none" stroke="rgba(184,148,90,0.4)" stroke-width="1"/>
    <circle r="100" fill="rgba(184,148,90,0.06)"/>
    <!-- Latitude lines -->
    <ellipse rx="100" ry="34" fill="none" stroke="rgba(184,148,90,0.35)" stroke-width="1"/>
    <ellipse rx="100" ry="68" fill="none" stroke="rgba(184,148,90,0.3)" stroke-width="1"/>
    <!-- Longitude lines -->
    <ellipse rx="34" ry="100" fill="none" stroke="rgba(184,148,90,0.3)" stroke-width="1"/>
    <ellipse rx="68" ry="100" fill="none" stroke="rgba(184,148,90,0.35)" stroke-width="1"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke="rgba(184,148,90,0.35)"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="rgba(184,148,90,0.35)"/>

    <!-- Japan/Philippines markers -->
    <circle cx="35" cy="-40" r="6" fill="#b8945a"/>
    <circle cx="35" cy="-40" r="14" fill="none" stroke="#b8945a" opacity="0.6"/>
    <circle cx="20" cy="20" r="6" fill="#c9a96e"/>
    <circle cx="20" cy="20" r="14" fill="none" stroke="#c9a96e" opacity="0.6"/>
    <!-- Connection arc -->
    <path d="M 35 -40 Q 50 -10 20 20" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
  </g>

  <!-- Cart icon -->
  <g transform="translate(80,90)" stroke="#b8945a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L12 0 L20 50 L70 50 L78 12 L18 12"/>
    <circle cx="30" cy="65" r="5" fill="#b8945a"/>
    <circle cx="62" cy="65" r="5" fill="#b8945a"/>
  </g>

  <!-- Floating cards -->
  <g transform="translate(460,80)" opacity="0.85">
    <rect width="80" height="56" rx="3" fill="rgba(184,148,90,0.18)" stroke="rgba(184,148,90,0.5)"/>
    <text x="8" y="20" fill="#b8945a" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="700" letter-spacing="1">GMV</text>
    <text x="8" y="44" fill="#fff" font-family="'Noto Serif JP',serif" font-size="18" font-weight="700">¥2.4B</text>
  </g>
  <g transform="translate(460,240)" opacity="0.75">
    <rect width="80" height="48" rx="3" fill="rgba(184,148,90,0.12)" stroke="rgba(184,148,90,0.4)"/>
    <text x="8" y="18" fill="#b8945a" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="700" letter-spacing="1">CVR</text>
    <text x="8" y="38" fill="#fff" font-family="'Noto Serif JP',serif" font-size="16" font-weight="700">3.8%</text>
  </g>
</svg>
